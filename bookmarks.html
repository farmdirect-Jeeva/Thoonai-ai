<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JVFS83MYWG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-JVFS83MYWG");
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bookmarks | Thoonai AI</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#B84D24"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Thoonai AI"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
.bm-page{padding-bottom:60px;}
.bm-empty{text-align:center;padding:64px 20px;}
.bm-empty-icon{font-size:4rem;margin-bottom:16px;}
.bm-grid{display:flex;flex-direction:column;gap:14px;}
.bm-card{padding:20px;}
.bm-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.bm-card h3{font-size:.98rem;font-weight:600;line-height:1.4;margin-bottom:6px;}
.bm-card p{font-size:.82rem;color:var(--txt2);line-height:1.55;}
.bm-card-meta{font-size:.72rem;color:var(--txt3);margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.bm-del-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--txt3);transition:color .2s;flex-shrink:0;padding:4px;}
.bm-del-btn:hover{color:#ef4444;}
.bm-expand-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;font-size:.75rem;font-weight:600;border:1.5px solid var(--border);color:var(--txt2);background:transparent;cursor:pointer;font-family:var(--f-body);transition:all .2s;margin-top:10px;}
.bm-expand-btn:hover{border-color:var(--terra);color:var(--terra);}
.bm-analysis{display:none;margin-top:12px;}
.bm-analysis.open{display:block;}
.bm-stats-row{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.bm-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;flex:1;min-width:100px;}
.bm-stat-n{font-size:1.6rem;font-weight:700;color:var(--terra);}
.bm-stat-l{font-size:.72rem;color:var(--txt3);margin-top:2px;}
.clear-all-btn{background:none;border:1px solid #ef4444;color:#ef4444;padding:6px 14px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;}
.clear-all-btn:hover{background:#ef4444;color:#fff;}
</style>
</head>
<body>
<div id="hdr-mount"></div>

<main style="flex:1;">
  <div class="wrap bm-page">
    <div class="page-hdr">
      <div class="section-label">Your Saved Articles</div>
      <div class="page-hdr-row">
        <h1>🔖 Bookmarks</h1>
      </div>
      <div class="deco-line"></div>
      <p style="color:var(--txt2);font-size:.93rem;margin-top:4px;">Articles you saved from Current Affairs for quick revision.</p>
    </div>

    <div id="bm-stats" style="display:none;" class="bm-stats-row">
      <div class="bm-stat">
        <div class="bm-stat-n" id="bm-total">0</div>
        <div class="bm-stat-l">Saved Articles</div>
      </div>
      <div class="bm-stat">
        <div class="bm-stat-n" id="bm-cats">0</div>
        <div class="bm-stat-l">Topics</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;" id="bm-toolbar" style="display:none;">
      <div id="bm-filter-row" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
      <button class="clear-all-btn" onclick="clearAllBookmarks()">🗑 Clear All</button>
    </div>

    <div id="bm-content"></div>
  </div>
</main>

<div id="ftr-mount"></div>
<script src="js/common.js"></script>
<script src="js/ai.js"></script>
<script>
document.getElementById('hdr-mount').outerHTML = buildHeader('bm');
document.getElementById('ftr-mount').outerHTML = buildFooter();
checkScreenSize();

const CAT_CLASS = {
  'Polity':'c-polity','Economy':'c-eco','International Relations':'c-ir',
  'Science & Tech':'c-sci','Environment':'c-env','Tamil Nadu':'c-tn',
  'Defence':'c-def','Social':'c-soc'
};

let activeFilter = 'All';

function renderBookmarks() {
  const bms = getBookmarks();
  const content = document.getElementById('bm-content');
  const toolbar = document.getElementById('bm-toolbar');
  const statsRow = document.getElementById('bm-stats');

  if(bms.length === 0) {
    statsRow.style.display = 'none';
    toolbar.style.display = 'none';
    content.innerHTML = `
      <div class="card bm-empty">
        <div class="bm-empty-icon">🔖</div>
        <h3 style="font-size:1.2rem;margin-bottom:8px;">No bookmarks yet</h3>
        <p style="color:var(--txt2);margin-bottom:20px;">Save articles from Current Affairs to read them later.</p>
        <a class="btn btn-primary" href="current-affairs.html">📰 Go to Current Affairs</a>
      </div>`;
    return;
  }

  // Stats
  const cats = [...new Set(bms.map(b => b.cat))];
  document.getElementById('bm-total').textContent = bms.length;
  document.getElementById('bm-cats').textContent = cats.length;
  statsRow.style.display = 'flex';
  toolbar.style.display = 'flex';

  // Filters
  const filtered = activeFilter === 'All' ? bms : bms.filter(b => b.cat === activeFilter);
  document.getElementById('bm-filter-row').innerHTML = `
    <button class="filter-btn ${activeFilter==='All'?'on':''}" onclick="setFilter('All')">All (${bms.length})</button>
    ${cats.map(c => `<button class="filter-btn ${activeFilter===c?'on':''}" onclick="setFilter('${c}')">${c} (${bms.filter(b=>b.cat===c).length})</button>`).join('')}
  `;

  if(filtered.length === 0) {
    content.innerHTML = `<div class="card" style="padding:40px;text-align:center;">No bookmarks in this category.</div>`;
    return;
  }

  content.innerHTML = `<div class="bm-grid">
    ${filtered.map((n, i) => `
      <div class="card bm-card anim-up" style="animation-delay:${i*40}ms;" id="bmc-${n.id}">
        <div class="bm-card-top">
          <div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
              <span class="badge ${CAT_CLASS[n.cat]||'c-polity'}">${n.cat}</span>
              <span style="font-size:.7rem;color:var(--txt3);">Saved ${fmtDate(n.savedAt)}</span>
            </div>
            <h3>${n.title}</h3>
            <p>${n.summary}</p>
          </div>
          <button class="bm-del-btn" onclick="removeBookmark('${n.id}')" title="Remove bookmark">🗑</button>
        </div>
        ${n.pre || n.main ? `
        <button class="bm-expand-btn" id="beb-${n.id}" onclick="toggleBmAna('${n.id}')">
          ✨ View Analysis ▼
        </button>
        <div class="bm-analysis" id="bma-${n.id}">
          ${n.pre ? `<div class="panel p-pre"><div class="panel-lbl">⚡ Prelims Pointer</div><div class="panel-txt">${n.pre}</div></div>` : ''}
          ${n.main ? `<div class="panel p-main"><div class="panel-lbl">📚 Mains Analysis</div><div class="panel-txt">${n.main}</div></div>` : ''}
          ${n.stat ? `<div class="panel p-stat"><div class="panel-lbl">🔗 Static Link</div><div class="panel-txt">${n.stat}</div></div>` : ''}
        </div>` : ''}
      </div>`).join('')}
  </div>`;
}

function toggleBmAna(id) {
  const ana = document.getElementById('bma-' + id);
  const btn = document.getElementById('beb-' + id);
  const open = ana.classList.toggle('open');
  btn.textContent = open ? '✨ Hide Analysis ▲' : '✨ View Analysis ▼';
}

function removeBookmark(id) {
  let bms = getBookmarks().filter(b => b.id !== id);
  localStorage.setItem('thoonai-bookmarks', JSON.stringify(bms));
  showToast('🗑 Removed from bookmarks');
  renderBookmarks();
}

function clearAllBookmarks() {
  if(!confirm('Remove all bookmarks? This cannot be undone.')) return;
  localStorage.removeItem('thoonai-bookmarks');
  showToast('🗑 All bookmarks cleared');
  renderBookmarks();
}

function setFilter(cat) {
  activeFilter = cat;
  renderBookmarks();
}

document.addEventListener('DOMContentLoaded', renderBookmarks);
</script>
</body>
</html>
