<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

  window.dataLayer = window.dataLayer || [];

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search | Thoonai AI</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="hdr-mount"></div>
<main style="flex:1;">
  <div class="wrap srch-wrap">
    <div class="page-hdr">
      <div class="section-label">Find Any Topic</div>
      <h1>Search Thoonai</h1>
      <div class="deco-line"></div>
      <p style="color:var(--txt2);font-size:.93rem;margin-top:4px;">Search across Current Affairs and GK Library topics.</p>
    </div>
    <div class="srch-form">
      <span class="s-ico">🔍</span>
      <input type="text" id="srch-input" placeholder='Try "Polity", "ISRO", "Kaveri", "RBI"…'
        onkeydown="if(event.key==='Enter')doSearch()"
        oninput="if(this.value.length>2)doSearch()"/>
      <button class="btn btn-primary btn-sm srch-go" onclick="doSearch()">Search</button>
    </div>
    <div id="srch-results"></div>
  </div>
</main>
<div id="ftr-mount"></div>
<script src="js/common.js"></script>
<script src="js/ai.js"></script>
<script src="js/gkdata.js"></script>
<script>
document.getElementById('hdr-mount').outerHTML = buildHeader('srch');
document.getElementById('ftr-mount').outerHTML = buildFooter();
checkScreenSize();

// Normalize search query — handles Art./Article, No./Number etc.
function normalize(str) {
  return str.toLowerCase()
    .replace(/article\s*/gi, 'art. ')
    .replace(/art\.\s*/gi, 'art. ')
    .replace(/section\s*/gi, 'sec. ')
    .replace(/\s+/g, ' ')
    .trim();
}

function matches(text, q) {
  const t = text.toLowerCase();
  const n = normalize(text);
  const nq = normalize(q);
  return t.includes(q.toLowerCase()) || n.includes(nq);
}

function doSearch() {
  const q = document.getElementById('srch-input').value.trim();
  renderResults(q);
  const url = new URL(window.location);
  url.searchParams.set('q', q);
  window.history.replaceState({}, '', url);
}

function renderResults(q) {
  const out = document.getElementById('srch-results');
  if(!q || q.length < 2) {
    out.innerHTML = `
      <div class="srch-empty">
        <div class="ico">🔍</div>
        <h3 style="font-size:1.3rem;margin-bottom:8px;">Search Thoonai</h3>
        <p style="color:var(--txt3);">Try "RBI", "ISRO", "Polity", "Tamil Nadu", "Fundamental Rights"…</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;">
          ${['Polity','ISRO','RBI','Tamil Nadu','Environment','Economy','GPAI','Kaveri'].map(t=>
            `<span onclick="document.getElementById('srch-input').value='${t}';doSearch();"
              style="padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);font-size:.8rem;cursor:pointer;color:var(--terra);">${t}</span>`
          ).join('')}
        </div>
      </div>`;
    return;
  }

  // Get news from cache or mock
  let news = MOCK_NEWS;
  try {
    const raw = localStorage.getItem('thoonai-news-cache');
    if(raw) {
      const cache = JSON.parse(raw);
      const allEntry = Object.values(cache).find(e => e.date === todayStr() && e.data);
      if(allEntry) news = allEntry.data;
    }
  } catch(e) {}

  // Search news
  const matchNews = news.filter(n =>
    matches(n.title, q) ||
    matches(n.summary, q) ||
    matches(n.cat, q) ||
    matches(n.pre || '', q) ||
    matches(n.main || '', q) ||
    matches(n.stat || '', q)
  );

  // Search GK
  const matchGK = [];
  GK.forEach(s => {
    // Match subject itself
    if(matches(s.title, q) || matches(s.desc, q)) {
      s.topics.forEach((t, i) => matchGK.push({s, t, i}));
      return;
    }
    s.topics.forEach((t, i) => {
      if(matches(t.title, q) || t.facts.some(f => matches(f, q))) {
        matchGK.push({s, t, i});
      }
    });
  });

  // Remove duplicates
  const seen = new Set();
  const uniqueGK = matchGK.filter(({s,t}) => {
    const key = s.id + t.title;
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  const total = matchNews.length + uniqueGK.length;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const hl = t => t.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');

  if(!total) {
    out.innerHTML = `
      <div class="srch-empty">
        <div class="ico">🤔</div>
        <h3 style="font-size:1.3rem;margin-bottom:8px;">No results for "${q}"</h3>
        <p style="color:var(--txt3);margin-bottom:16px;">Try a broader keyword or browse directly:</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
          <a href="current-affairs.html" class="btn btn-primary btn-sm">📰 Current Affairs</a>
          <a href="gk-library.html" class="btn btn-outline btn-sm">📚 GK Library</a>
        </div>
      </div>`;
    return;
  }

  let html = `<p style="font-size:.9rem;font-weight:600;color:var(--txt2);margin-bottom:4px;">
    ${total} result${total!==1?'s':''} for "<em>${q}</em>"
  </p>`;

  if(matchNews.length) {
    html += `<div class="srch-sec"><h3>📰 Current Affairs (${matchNews.length})</h3>`;
    html += matchNews.map(n => `
      <a class="card srch-nc" href="current-affairs.html#${n.id}">
        <span class="badge ${CAT_CLASS[n.cat]||'c-polity'}">${n.cat}</span>
        <h4>${hl(n.title)}</h4>
        <p>${hl(n.summary)}</p>
      </a>`).join('');
    html += '</div>';
  }

  if(uniqueGK.length) {
    html += `<div class="srch-sec"><h3>📚 GK Library (${uniqueGK.length})</h3>`;
    html += uniqueGK.map(({s, t}) => `
      <a class="card srch-gk" href="gk-library.html">
        <span style="font-size:1.8rem;flex-shrink:0;">${s.emoji}</span>
        <div>
          <div style="font-size:.73rem;color:var(--txt3);margin-bottom:3px;">${s.title}</div>
          <div style="font-size:.93rem;font-weight:600;color:var(--txt);">${hl(t.title)}</div>
          <div style="font-size:.78rem;color:var(--txt3);margin-top:3px;">
            ${t.facts.find(f => matches(f, q)) ? hl(t.facts.find(f => matches(f, q)).substring(0,80))+'…' : ''}
          </div>
        </div>
      </a>`).join('');
    html += '</div>';
  }

  out.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  const q = new URLSearchParams(window.location.search).get('q') || '';
  if(q) { document.getElementById('srch-input').value = q; renderResults(q); }
  else renderResults('');
});
</script>
</body>
</html>
